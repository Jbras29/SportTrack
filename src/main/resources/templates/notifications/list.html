<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Sport Track</title>
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .notif-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
        .notif-item {
            display: block;
            padding: 1rem 1.1rem;
            border-radius: 12px;
            border: 1px solid var(--border, #e5e7eb);
            background: var(--surface, #fff);
            text-decoration: none;
            color: inherit;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        .notif-item:hover { border-color: var(--primary, #6d28d9); background: var(--surface-alt, #f9fafb); }
        .notif-item-type {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted, #6b7280);
            margin-bottom: 0.35rem;
        }
        .notif-item-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; }
        .notif-item-detail { font-size: 0.92rem; color: var(--text-muted, #4b5563); line-height: 1.45; }
        .notif-item-date { font-size: 0.8rem; color: var(--text-muted, #9ca3af); margin-top: 0.5rem; }
        .notif-empty { color: var(--text-muted, #6b7280); padding: 2rem 0; text-align: center; }
    </style>
</head>
<body class="app-shell">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--stack">
        <div class="page-header">
            <h1>Notifications</h1>
            <p class="empty-copy" style="margin-top:0.25rem;">Du plus récent au plus ancien</p>
        </div>

        <p class="notif-empty" th:if="${#lists.isEmpty(notifications)}">
            Aucune notification pour le moment.
        </p>

        <div class="notif-list" th:if="${!#lists.isEmpty(notifications)}">
            <a th:each="n : ${notifications}"
               th:href="${n.lien}"
               class="notif-item">
                <div class="notif-item-type" th:switch="${n.type.name()}">
                    <span th:case="'REACTION'">Réaction</span>
                    <span th:case="'REPONSE_ACTIVITE'">Commentaire</span>
                    <span th:case="'ANNONCE_EVENEMENT'">Événement</span>
                    <span th:case="'RAPPEL_ACTIVITE'">Rappel</span>
                    <span th:case="'RAPPEL_CHALLENGE_QUOTIDIEN'">Défi</span>
                </div>
                <div class="notif-item-title" th:text="${n.titre}">Titre</div>
                <div class="notif-item-detail" th:text="${n.detail}">Détail</div>
                <div class="notif-item-date"
                     th:text="${#temporals.format(n.dateTri, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</div>
            </a>
        </div>
    </div>

</body>
</html>
