<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte | Sport Track</title>
    <style>
        /* Palette de couleurs */
        :root {
            --bleu-principal: #135077;
            --orange-principal: #F39434;
            --bleu-clair: #21A2D7;
            --vert: #8EB445;
            --blanc-casse: #FCFDFD;
        }

        body {
            background-color: var(--blanc-casse);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--bleu-principal);
        }

        /* Conteneur élargi pour gérer les deux colonnes */
        .register-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(19, 80, 119, 0.1);
            width: 100%;
            max-width: 600px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }
        .logo .sport {
            color: var(--bleu-principal);
        }

        .logo .track {
            color: var(--orange-principal);
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            color: #667;
            margin-bottom: 30px;
        }

        /* Grille pour le formulaire */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px;
        }

        /* Pour que certains champs prennent toute la largeur si besoin */
        .full-width {
            grid-column: span 2;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            color: var(--bleu-principal);
            background-color: #fff;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: var(--bleu-clair);
            outline: none;
            box-shadow: 0 0 0 3px rgba(33, 162, 215, 0.15);
        }

        /* Bouton principal : Vert pour valider la création */
        .btn-primary {
            background-color: var(--vert);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
            margin-top: 25px;
        }

        .btn-primary:hover {
            background-color: #7a9c3b; /* Vert légèrement plus sombre */
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .login-link a {
            color: var(--orange-principal);
            text-decoration: none;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: var(--bleu-principal);
        }

        /* Responsive : on repasse sur 1 colonne pour les petits écrans */
        @media (max-width: 500px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
            .register-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="logo">
            <span class="sport">Sport</span><span class="track">Track</span>
        </div>
        <div class="subtitle">Créez votre profil d'athlète</div>

        <form action="/utilisateurs/create" method="POST">
            <div class="form-grid">
                
                <div class="input-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" placeholder="Ousmane" required>
                </div>

                <div class="input-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" placeholder="Feno" required>
                </div>

                <div class="input-group full-width">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" name="email" placeholder="feno.sport@example.com" required>
                </div>

                <div class="input-group full-width">
                    <label for="motdepasse">Mot de passe</label>
                    <input type="password" id="motdepasse" name="motdepasse" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="sexe">Sexe</label>
                    <select id="sexe" name="sexe">
                        <option value="">Sélectionnez...</option>
                        <option value="M">Homme</option>
                        <option value="F">Femme</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="age">Âge</label>
                    <input type="number" id="age" name="age" min="1" max="120" placeholder="ex: 25">
                </div>

                <div class="input-group">
                    <label for="poids">Poids (kg)</label>
                    <input type="number" step="0.1" id="poids" name="poids" placeholder="ex: 70.5">
                </div>

                <div class="input-group">
                    <label for="taille">Taille (cm)</label>
                    <input type="number" step="1" id="taille" name="taille" placeholder="ex: 175">
                </div>

            </div>

            <button type="submit" class="btn-primary">Rejoindre l'aventure</button>
        </form>

        <div class="login-link">
            Déjà un compte ? <a href="./login.html">Se connecter ici</a>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('motdepasse').value;
            if (password.length < 8) {
                alert('Le mot de passe doit contenir au moins 8 caractères.');
                e.preventDefault();
                return;
            }
            const age = document.getElementById('age').value;
            if (age && (age < 1 || age > 120)) {
                alert('Veuillez entrer un âge valide.');
                e.preventDefault();
                return;
            }
        });
    </script>
</body>
</html>
