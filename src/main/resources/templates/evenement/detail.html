<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sport Track | Détail de l'événement</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="app-shell event-list-page evenement-detail-page">

<nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

<div class="main-wrapper">

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: start;">
            <div>
                <h1 class="header-title" th:text="${evenement.nom}">Titre de l'événement</h1>
                <div class="header-meta">
                    <span th:text="'📅 ' + ${#temporals.format(evenement.date, 'dd MMM yyyy HH:mm')}">Date</span>
                    <span th:text="'👑 Organisé par ' + ${evenement.organisateur.nom}">Organisateur</span>
                </div>
            </div>
            <button th:if="${isOrganisateur}" class="btn-action" onclick="activerModeEdition()">✏️ Modifier l'événement</button>
            <div th:if="${!isOrganisateur}">
                <button th:if="${isParticipant}" class="btn-action btn-danger" onclick="quitterEvenement()">
                    🏃‍♂️ Quitter
                </button>
                <button th:unless="${isParticipant}" class="btn-action btn-primary" th:attr="onclick=|rejoindreEvenement(${evenement.id}, this)|">
                    🤝 Rejoindre
                </button>
            </div>
        </div>
        <p th:text="${evenement.description}">Description de l'événement...</p>
    </div>

    <div class="content-grid">

        <div class="card">
            <h2 class="section-title">📢 Annonces</h2>

            <div th:if="${isOrganisateur}" style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border-light);">
                <textarea id="nouvelleAnnonce" rows="2" placeholder="Écrire une annonce à tous les participants..."></textarea>
                <button class="btn-action" style="margin-top: 10px; background: var(--brand-orange);" th:attr="onclick=|publierAnnonce(${evenement.id})|">Publier l'annonce</button>
            </div>

            <div id="listeAnnonces">
                <p th:if="${#lists.isEmpty(evenement.annonces)}" class="text-muted">Aucune annonce pour le moment.</p>

                <div th:each="annonce : ${evenement.annonces}" class="annonce-box" style="position: relative;">
                    <span class="annonce-date" th:text="${#temporals.format(annonce.date, 'dd/MM HH:mm')}">Date</span>

                    <button th:if="${isOrganisateur}"
                            class="btn-danger"
                            style="position: absolute; right: 10px; top: 10px; padding: 2px 8px; font-size: 12px;"
                            th:attr="onclick=|confirmerSuppressionAnnonce(${evenement.id}, ${annonce.id})|">
                        🗑️
                    </button>

                    <p th:text="${annonce.message}" style="margin:0; padding-right: 40px;">Message</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="section-title">
                👥 Participants
                <span th:text="${#lists.size(evenement.participants)}">0</span>
            </h2>

            <div class="participant-list">
                <a th:each="participant : ${evenement.participants}"
                   th:href="@{/profile/{id}(id=${participant.id})}"
                   class="participant-item-link">

                    <div class="participant-content">
                        <div class="avatar-container">
                            <img th:src="${participant.cheminPhotoProfilAffichee()}"
                                 class="user-avatar"
                                 alt="Photo de profil">
                        </div>

                        <span class="participant-name" th:text="${participant.nom}">Nom</span>
                    </div>

                    <button th:if="${isOrganisateur}"
                            class="btn-kick"
                            th:attr="onclick=|event.preventDefault(); retirerParticipant(${evenement.id}, ${participant.id})|">
                        ✕
                    </button>
                </a>
            </div>
        </div>

    </div>
</div>
<div id="modalModifier" th:if="${isOrganisateur}" class="evenement-modal-overlay">

    <div class="evenement-modal-panel modal-content-card">

        <h2>Modifier l'événement</h2>

        <form id="formModifier">
            <div class="form-group">
                <label class="form-label">Titre</label>
                <input type="text" id="editNom" th:value="${evenement.nom}" required>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label class="form-label">Date & Heure</label>
                <input type="datetime-local" id="editDate"
                       th:value="${#temporals.format(evenement.date, 'yyyy-MM-dd HH:mm')}"
                       required>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label class="form-label">Description</label>
                <textarea id="editDescription" rows="4" th:text="${evenement.description}"></textarea>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px;">
                <button type="button" class="btn btn-secondary" onclick="fermerModal()">Annuler</button>
                <button type="submit" class="btn btn-primary">Sauvegarder</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ==========================================
    // Ces fonctions JS feront appel aux API que nous avons créées
    // Elles utilisent SweetAlert2 pour les notifications
    // ==========================================

    // Ouvrir le modal de modification
    function activerModeEdition() {
        document.getElementById('modalModifier').style.display = 'flex';
    }

    // Fermer le modal
    function fermerModal() {
        document.getElementById('modalModifier').style.display = 'none';
    }

    // Gérer la soumission du formulaire de modification
    document.getElementById('formModifier')?.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Récupérer l'ID de l'événement depuis l'URL
        const eventId = window.location.pathname.split('/').pop();

        const updatedData = {
            nom: document.getElementById('editNom').value,
            date: document.getElementById('editDate').value,
            description: document.getElementById('editDescription').value
        };

        try {
            const response = await fetch(`/api/evenements/${eventId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedData)
            });

            if (response.ok) {
                fermerModal();

                Swal.fire({
                    title: 'Succès !',
                    text: "Événement mis à jour avec succès !",
                    icon: 'success',
                    confirmButtonColor: '#135077', // Ta couleur bleu marque
                    confirmButtonText: 'Super'
                }).then((result) => {
                    // On ne recharge la page qu'après le clic sur le bouton
                    if (result.isConfirmed) {
                        location.reload();
                    }
                });
            } else {
                // ❌ Remplacement alert -> Swal.fire (Erreur API)
                Swal.fire({
                    title: 'Erreur',
                    text: "Impossible de mettre à jour l'événement.",
                    icon: 'error',
                    confirmButtonColor: '#ef4444'
                });
            }
        } catch (error) {
            console.error("Erreur:", error);
            // ❌ Remplacement alert -> Swal.fire (Erreur Réseau)
            Swal.fire('Erreur', "Problème de connexion au serveur.", 'error');
        }
    });

    async function publierAnnonce(eventId) {
        const text = document.getElementById('nouvelleAnnonce').value;
        if(!text) return;

        try {
            const response = await fetch(`/api/evenements/${eventId}/annonces`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            if(response.ok) {
                // Ici, on recharge directement, mais on pourrait aussi mettre un toast succès.
                location.reload();
            } else {
                // ❌ Remplacement alert
                Swal.fire('Erreur', "Erreur lors de la publication.", 'error');
            }
        } catch (error) {
            console.error("Erreur:", error);
            Swal.fire('Erreur', "Impossible de publier l'annonce.", 'error');
        }
    }

    /** Fonction pour retirer un participant de l'événement. */
    async function retirerParticipant(eventId, participantId) {

        Swal.fire({
            title: 'Êtes-vous sûr ?',
            text: "Voulez-vous vraiment retirer ce participant ?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444', // Rouge pour danger
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Oui, retirer !',
            cancelButtonText: 'Annuler',
            reverseButtons: true // Inverse l'ordre pour avoir Annuler à gauche
        }).then(async (result) => {
            // Cette partie s'exécute quand l'utilisateur clique sur un bouton
            if (result.isConfirmed) {
                try {
                    // 2. Appel à l'API DELETE
                    const response = await fetch(`/api/evenements/${eventId}/participants/${participantId}`, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (response.ok) {
                        // On recharge la page pour mettre à jour la liste
                        location.reload();
                    } else {
                        const errorText = await response.text();

                        Swal.fire('Erreur', "Erreur lors du retrait : " + errorText, 'error');
                    }
                } catch (error) {
                    console.error("Erreur réseau :", error);
                    Swal.fire('Erreur', "Impossible de contacter le serveur.", 'error');
                }
            }
        });
    }


    async function rejoindreEvenement(eventId, btnElement) {

        btnElement.disabled = true;

        try {
            const response = await fetch(`/api/evenements/${eventId}/rejoindre`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {

                Swal.fire({
                    title: 'Félicitations !',
                    text: "Vous avez rejoint l'événement.",
                    icon: 'success',
                    confirmButtonColor: '#135077'
                }).then(() => {
                    location.reload();
                });
            } else {
                const errorText = await response.text();
                Swal.fire('Erreur', errorText || "Impossible de rejoindre l'événement.", 'error');
                btnElement.disabled = false;
            }
        } catch (error) {
            console.error("Erreur:", error);
            Swal.fire('Erreur', "Problème de connexion au serveur.", 'error');
            btnElement.disabled = false;
        }
    }


    /** Fonction pour que l'utilisateur quitte l'événement lui-même. */
    async function quitterEvenement() {
        const eventId = window.location.pathname.split('/').filter(p => p !== "").pop();

        Swal.fire({
            title: 'Quitter cet événement ?',
            text: "Vous ne ferez plus partie de la liste des participants.",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Oui, quitter',
            cancelButtonText: 'Annuler'
        }).then(async (result) => {
            if (result.isConfirmed) {
                try {
                    const response = await fetch(`/api/evenements/${eventId}/quitter`, {
                        method: 'POST'
                    });

                    if (response.ok) {
                        Swal.fire({
                            title: 'Au revoir !',
                            text: "Vous avez quitté l'événement.",
                            icon: 'success',
                            confirmButtonColor: '#135077'
                        }).then(() => {
                            location.reload();
                        });
                    } else {
                        Swal.fire('Erreur', "Impossible de quitter l'événement.", 'error');
                    }
                } catch (error) {
                    Swal.fire('Erreur', "Problème de connexion au serveur.", 'error');
                }
            }
        });
    }


    // Fonction pour supprimer une annonce avec confirmation
    async function confirmerSuppressionAnnonce(eventId, annonceId) {

        Swal.fire({
            title: 'Supprimer cette annonce ?',
            text: "Cette action est irréversible !",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Oui, supprimer !',
            cancelButtonText: 'Annuler'
        }).then(async (result) => {
            if (result.isConfirmed) {
                try {
                    const response = await fetch(`/api/evenements/${eventId}/annonces/${annonceId}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        location.reload();
                    } else {
                        Swal.fire('Erreur', "Erreur lors de la suppression.", 'error');
                    }
                } catch (error) {
                    console.error("Erreur réseau :", error);
                    Swal.fire('Erreur', "Impossible de contacter le serveur.", 'error');
                }
            }
        });
    }
</script>
</body>
</html>
