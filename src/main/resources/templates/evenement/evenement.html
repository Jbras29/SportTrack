<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Track | Événements</title>
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="app-shell event-list-page">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--stack">
        <div class="page-header">
            <div>
                <h1>Événements disponibles</h1>
                <p>Rejoignez des défis et pratiquez avec la communauté.</p>
            </div>
            <a th:href="@{/creer-evenement}" class="btn-create">+ NOUVEAU</a>
        </div>

        <div class="events-grid">
            <p th:if="${#lists.isEmpty(evenements)}" class="event-list-empty text-muted">
                Aucun événement disponible pour le moment.
            </p>

            <div class="event-card" th:each="evt : ${evenements}">
                <div class="card-header">
                    <h3 class="event-title" th:text="${evt.nom}">Titre</h3>
                    <span class="event-date" th:text="'📅 ' + ${#temporals.format(evt.date, 'dd MMM yyyy HH:mm')}">Date</span>
                </div>
                <p class="event-desc" th:text="${evt.description} ? ${evt.description} : 'Aucune description'">Description</p>

                <div class="card-footer">
                    <span class="participants-count">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span th:text="${#lists.size(evt.participants)} + ' participants'"></span>
                    </span>
                    <div class="card-actions"
                         th:with="participe=${#lists.contains(evt.participants.![id], user.id) or evt.organisateur.id == user.id}">
                        <a th:href="@{/evenements/{id}(id=${evt.id})}" class="btn-detail">Détails</a>
                        <span th:if="${participe}" class="event-registered">Déjà inscrit</span>
                        <button th:unless="${participe}" type="button" class="btn-join"
                                th:attr="onclick=|rejoindreEvenement(${evt.id}, this)|">Rejoindre</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function rejoindreEvenement(evenementId, btnElement) {
            // Désactiver le bouton pour éviter les doubles clics
            btnElement.disabled = true;
            btnElement.innerText = "Traitement...";

            try {
                const response = await fetch("/api/evenements/" + evenementId + "/rejoindre", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }
                });

                if (response.ok) {
                    // ✅ Utilisation de SweetAlert2 pour le succès
                    Swal.fire({
                        title: 'Félicitations !',
                        text: "Vous avez rejoint l'événement.",
                        icon: 'success',
                        confirmButtonColor: '#135077',
                        confirmButtonText: 'Génial'
                    }).then((result) => {
                        // On ne recharge la page que si l'utilisateur a cliqué sur OK
                        if (result.isConfirmed) {
                            location.reload();
                        }
                    });
                } else {
                    const erreurMsg = await response.text();
                    // ❌ Utilisation de SweetAlert2 pour l'erreur API
                    Swal.fire({
                        title: 'Oups...',
                        text: "Impossible de rejoindre : " + (erreurMsg || "Erreur inconnue"),
                        icon: 'error',
                        confirmButtonColor: '#ef4444'
                    });
                    btnElement.disabled = false;
                    btnElement.innerText = "Rejoindre";
                }
            } catch (error) {
                console.error("Erreur:", error);
                // ❌ Utilisation de SweetAlert2 pour l'erreur réseau
                Swal.fire({
                    title: 'Erreur Serveur',
                    text: "Impossible de contacter le serveur. Veuillez réessayer plus tard.",
                    icon: 'error',
                    confirmButtonColor: '#64748b'
                });
                btnElement.disabled = false;
                btnElement.innerText = "Rejoindre";
            }
        }
    </script>
</body>
</html>
