<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Track | Créer un Événement</title>
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        .friend-checkbox-card {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .friend-checkbox-card:hover { background-color: #f8fafc; }

        .friend-info { display: flex; align-items: center; gap: 12px; flex-grow: 1; }


        .avatar-wrapper {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            overflow: hidden;
            background: #e2e8f0;
            flex-shrink: 0;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ami-check { margin-right: 15px; width: 18px; height: 18px; }
    </style>
</head>
<body class="app-shell event-create-page">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--stack">
        <div class="page-header event-create-header">
            <h1 class="event-form-title">Nouvel événement</h1>
            <p class="event-form-subtitle">Organisez un événement et invitez votre communauté.</p>
        </div>

        <div class="form-card">
            <form id="formEvenement">
                <div class="form-group">
                    <label for="nom">Titre de l'événement</label>
                    <input type="text" id="nom" placeholder="Ex: Course matinale au parc" required>
                </div>

                <div class="form-group">
                    <label for="date">Date &amp; Heure</label>
                    <input type="datetime-local" id="date" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" placeholder="Quels sont les objectifs de cette séance ?"></textarea>
                </div>

                <div class="form-group">
                    <span class="form-group-heading">Inviter des amis</span>
                    <div id="listeAmis" class="friend-selector">
                        <p th:if="${#lists.isEmpty(amis)}" class="text-muted friend-selector-empty">Aucun ami trouvé.</p>

                        <label th:each="ami : ${amis}" class="friend-checkbox-card">
                            <input type="checkbox" class="ami-check" th:value="${ami.id}">
                            <div class="friend-info">
                                <div class="avatar-wrapper">
                                    <img th:src="${ami.cheminPhotoProfilAffichee()}" class="avatar-img" alt="Avatar">
                                </div>
                                <span th:text="${ami.nom}">Nom de l'ami</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="event-form-actions">
                    <button type="submit" id="btnSubmit" class="btn btn-primary event-submit">Créer l'événement</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("formEvenement").addEventListener("submit", async function (e) {
            e.preventDefault();
            var btn = document.getElementById("btnSubmit");

            var selected = Array.from(document.querySelectorAll(".ami-check:checked")).map(function (c) {
                return { id: parseInt(c.value, 10) };
            });

            var data = {
                nom: document.getElementById("nom").value,
                date: document.getElementById("date").value,
                description: document.getElementById("description").value,
                participants: selected
            };

            btn.disabled = true;
            btn.innerText = "Patientez…";

            try {
                var res = await fetch("/api/evenements/creer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                if (res.ok) {

                    Swal.fire({
                        title: 'Succès !',
                        text: "L'événement a été créé avec succès.",
                        icon: 'success',
                        confirmButtonColor: '#135077',
                        confirmButtonText: 'Génial'
                    }).then((result) => {
                        window.location.href = "/evenements";
                    });
                } else {
                    Swal.fire({
                        title: 'Erreur',
                        text: "Un problème est survenu lors de la création.",
                        icon: 'error',
                        confirmButtonColor: '#ef4444'
                    });
                }
            } catch (err) {
                console.error("Erreur détaillée:", err);
                Swal.fire('Erreur', "Impossible de contacter le serveur.", 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = "Créer l'événement";
            }
        });
    </script>
</body>
</html>
