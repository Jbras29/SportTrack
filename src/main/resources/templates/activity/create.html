<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une activité | Sport Track</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Palette de couleurs Sport Track */
        :root {
            --brand-blue: #135077;
            --brand-orange: #F39434;
            --brand-light-blue: #21A2D7;
            --brand-green: #8EB445;
            
            --bg-app: #F3F6F8;
            --bg-card: #FFFFFF;
            
            --text-main: #0F172A;
            --text-muted: #64748B;
            
            --border-light: #E2E8F0;
            --hover-bg: #F1F5F9;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MENU COMPACT (Sidebar) --- */
        .slim-sidebar {
            width: 80px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-light-blue));
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 40px;
            box-shadow: 0 4px 10px rgba(33, 162, 215, 0.3);
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .nav-btn:hover { background-color: var(--hover-bg); color: var(--brand-blue); }
        .nav-btn.active { background-color: rgba(33, 162, 215, 0.1); color: var(--brand-blue); }
        .nav-btn svg { width: 24px; height: 24px; }
        .spacer { flex-grow: 1; }

        /* --- CONTENU PRINCIPAL --- */
        .main-wrapper {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* --- FORMULAIRE --- */
        .form-card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .form-header { margin-bottom: 30px; }
        .form-header h1 { margin: 0 0 8px 0; font-size: 28px; color: var(--brand-blue); }
        .form-header p { margin: 0; color: var(--text-muted); font-size: 15px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width { grid-column: span 2; }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }
        
        .form-group label span.required { color: var(--brand-orange); }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.2s;
            background-color: #FAFCFD;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--brand-light-blue);
            background-color: var(--bg-card);
            box-shadow: 0 0 0 4px rgba(33, 162, 215, 0.1);
        }

        .input-suffix {
            position: relative;
        }
        .input-suffix input { padding-right: 50px; }
        .input-suffix::after {
            content: attr(data-suffix);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 14px;
            pointer-events: none;
        }

        /* --- COMPOSANT ÉTOILES (Pur CSS) --- */
        .rating-wrapper {
            display: inline-flex;
            flex-direction: row-reverse; /* Inversé pour gérer le hover/checked en CSS */
            justify-content: flex-end;
            gap: 6px;
        }

        .rating-wrapper input { display: none; }

        .rating-wrapper label {
            cursor: pointer;
            width: 32px;
            height: 32px;
            color: var(--border-light);
            transition: color 0.2s;
        }

        .rating-wrapper label svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* Logique de coloration des étoiles */
        .rating-wrapper input:checked ~ label,
        .rating-wrapper label:hover,
        .rating-wrapper label:hover ~ label {
            color: var(--brand-orange);
        }

        /* --- BOUTON DE SOUMISSION --- */
        .btn-submit {
            background-color: var(--brand-green);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: #7a9c3b;
            transform: translateY(-1px);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .main-wrapper { padding: 20px; }
            .form-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav class="slim-sidebar">
        <div class="logo-icon">S</div>
        <a href="#" class="nav-btn" title="Accueil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
        <a href="#" class="nav-btn active" title="Mes Activités">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        </a>
        <div class="spacer"></div>
        <a href="#" class="nav-btn" title="Mon Profil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
    </nav>

    <div class="main-wrapper">
        
        <div class="form-card">
            <div class="form-header">
                <h1>Nouvelle Activité</h1>
                <p>Enregistrez vos performances pour suivre votre progression.</p>
            </div>

            <form th:action="@{/activites}" method="POST">
                <input type="hidden" name="utilisateurId" th:value="${session.utilisateurId}">
                <div class="form-grid">

                    <div class="form-group full-width">
                        <label for="nom">Nom de l'activité <span class="required">*</span></label>
                        <input type="text" id="nom" name="nom" placeholder="Ex: Course matinale le long du canal" required>
                    </div>

                    <div class="form-group">
                        <label for="typeSport">Sport pratiqué <span class="required">*</span></label>
                        <select id="typeSport" name="typeSport" required>
                            <option value="" disabled selected>Sélectionnez un sport...</option>
                            <option th:each="type : ${typesSportifs}"
                                    th:value="${type.name()}"
                                    th:text="${#strings.capitalizeWords(#strings.replace(type.name(), '_', ' ').toLowerCase())}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="date">Date de l'activité <span class="required">*</span></label>
                        <input type="date" id="date" name="date" required
                               th:max="${#temporals.format(T(java.time.LocalDate).now(), 'yyyy-MM-dd')}">
                    </div>

                    <div class="form-group">
                        <label for="distance">Distance parcourue</label>
                        <div class="input-suffix" data-suffix="mètres">
                            <input type="number" id="distance" name="distance" min="0" step="1" placeholder="Ex: 5000">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="temps">Durée</label>
                        <div class="input-suffix" data-suffix="min">
                            <input type="number" id="temps" name="temps" min="0" step="1" placeholder="Ex: 45">
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="location">Ville / Lieu</label>
                        <input type="text" id="location" name="location" placeholder="Ex: Paris, Toulouse...">
                    </div>

                    <div class="form-group full-width">
                        <label>Comment évaluez-vous cette séance ?</label>
                        <div class="rating-wrapper">
                            <input type="radio" id="star5" name="evaluation" value="5">
                            <label for="star5" title="5 étoiles - Excellent">
                                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            </label>

                            <input type="radio" id="star4" name="evaluation" value="4">
                            <label for="star4" title="4 étoiles - Très bien">
                                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            </label>

                            <input type="radio" id="star3" name="evaluation" value="3">
                            <label for="star3" title="3 étoiles - Moyen">
                                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            </label>

                            <input type="radio" id="star2" name="evaluation" value="2">
                            <label for="star2" title="2 étoiles - Difficile">
                                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            </label>

                            <input type="radio" id="star1" name="evaluation" value="1">
                            <label for="star1" title="1 étoile - Mauvais">
                                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            </label>
                        </div>
                    </div>

                </div>

                <button type="submit" class="btn-submit">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Enregistrer l'activité
                </button>
            </form>
        </div>

    </div>

    <script>
        (function () {
            var input = document.getElementById('date');
            if (!input) return;
            function todayLocalIso() {
                var d = new Date();
                var m = String(d.getMonth() + 1).padStart(2, '0');
                var day = String(d.getDate()).padStart(2, '0');
                return d.getFullYear() + '-' + m + '-' + day;
            }
            input.max = todayLocalIso();
            function syncValidity() {
                var max = input.max;
                if (input.value && max && input.value > max) {
                    input.setCustomValidity("La date ne peut pas être postérieure à aujourd'hui.");
                } else {
                    input.setCustomValidity('');
                }
            }
            input.addEventListener('input', syncValidity);
            input.addEventListener('change', syncValidity);
            var form = input.closest('form');
            if (form) {
                form.addEventListener('submit', function (e) {
                    syncValidity();
                    if (!input.checkValidity()) {
                        e.preventDefault();
                        input.reportValidity();
                    }
                });
            }
        })();
    </script>
</body>
</html>
