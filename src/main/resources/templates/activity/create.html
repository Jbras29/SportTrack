<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une activité | Sport Track</title>
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        #meteo-preview-block {
            display: none;
            align-items: center;
            gap: 0.9rem;
            background: linear-gradient(135deg, rgba(99,179,237,0.10), rgba(66,153,225,0.05));
            border: 1px solid rgba(99,179,237,0.18);
            border-radius: 12px;
            padding: 0.85rem 1.1rem;
            margin-top: 0.6rem;
            transition: all 0.35s ease;
            animation: fadeInMeteo 0.3s ease;
        }
        #meteo-preview-block.visible { display: flex; }
        @keyframes fadeInMeteo {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #meteo-preview-icon { font-size: 2rem; line-height: 1; }
        #meteo-preview-text strong { display: block; font-size: 0.92rem; font-weight: 700; }
        #meteo-preview-text span   { font-size: 0.78rem; opacity: 0.6; }
        #meteo-loading {
            display: none;
            font-size: 0.78rem;
            opacity: 0.55;
            margin-top: 0.4rem;
            padding-left: 0.1rem;
        }
        #meteo-loading.visible { display: block; }
    </style>
</head>
<body class="app-shell activity-create-page">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--centered">
        <div class="form-card">
            <div class="form-header">
                <h1>Nouvelle Activité</h1>
                <p>Enregistrez vos performances, suivez votre progression et invitez des amis à participer à l'activité.</p>
            </div>

            <div th:if="${param.erreur}" class="flash-banner err" th:text="${param.erreur}"></div>

            <form th:action="@{/activites}" method="POST">
                <input type="hidden" name="utilisateurId" th:value="${session.utilisateurId}">

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="nom">Nom de l'activité <span class="required">*</span></label>
                        <input type="text" id="nom" name="nom" placeholder="Ex: Course matinale le long du canal" required>
                    </div>

                    <div class="form-group">
                        <label for="typeSport">Sport pratiqué <span class="required">*</span></label>
                        <select id="typeSport" name="typeSport" required>
                            <option value="" disabled selected>Sélectionnez un sport...</option>
                            <option
                                th:each="type : ${typesSportifs}"
                                th:value="${type.name()}"
                                th:text="${#strings.capitalizeWords(#strings.replace(type.name(), '_', ' ').toLowerCase())}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="date">Date de l'activité <span class="required">*</span></label>
                        <input
                            type="date"
                            id="date"
                            name="date"
                            required
                            th:max="${#temporals.format(T(java.time.LocalDate).now(), 'yyyy-MM-dd')}">
                    </div>

                    <div class="form-group">
                        <label for="distance">Distance parcourue</label>
                        <div class="input-suffix" data-suffix="mètres">
                            <input type="number" id="distance" name="distance" min="0" step="1" placeholder="Ex: 5000">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="temps">Durée</label>
                        <div class="input-suffix" data-suffix="min">
                            <input type="number" id="temps" name="temps" min="0" step="1" placeholder="Ex: 45">
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="location">Ville / Lieu
                            <span style="font-size:0.75rem;opacity:0.55;font-weight:500;"> — pour récupérer la météo</span>
                        </label>
                        <input type="text" id="location" name="location" placeholder="Ex: Paris, Toulouse..." autocomplete="off" list="location-suggestions">
                        <datalist id="location-suggestions"></datalist>
                        <div id="meteo-loading">🔎 Recherche météo...</div>
                        <div id="meteo-preview-block" role="status" aria-live="polite">
                            <div id="meteo-preview-icon">🌡️</div>
                            <div id="meteo-preview-text">
                                <strong id="meteo-preview-condition">—</strong>
                                <span id="meteo-preview-temp">—</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>Avec quels amis voulez-vous faire cette activité ?</label>

                        <div class="friends-checkbox-grid" th:if="${#lists.isEmpty(amis) == false}">
                            <label class="friend-checkbox-card" th:each="ami : ${amis}">
                                <input type="checkbox" name="invitesIds" th:value="${ami.id}">
                                <span class="friend-checkbox-content">
                                    <span class="friend-name" th:text="${ami.prenom + ' ' + ami.nom}"></span>
                                </span>
                            </label>
                        </div>

                        <p class="empty-state" th:if="${#lists.isEmpty(amis)}">
                            Vous n'avez pas encore d'amis à inviter.
                        </p>

                        <small class="form-help">
                            Cochez les amis avec qui vous souhaitez faire cette activité.
                        </small>
                    </div>

                    <div class="form-group full-width">
                        <label>Comment évaluez-vous cette séance ?</label>
                        <div class="rating-wrapper">
                            <input type="radio" id="star5" name="evaluation" value="5">
                            <label for="star5" title="5 étoiles - Excellent">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                            </label>

                            <input type="radio" id="star4" name="evaluation" value="4">
                            <label for="star4" title="4 étoiles - Très bien">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                            </label>

                            <input type="radio" id="star3" name="evaluation" value="3">
                            <label for="star3" title="3 étoiles - Moyen">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                            </label>

                            <input type="radio" id="star2" name="evaluation" value="2">
                            <label for="star2" title="2 étoiles - Difficile">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                            </label>

                            <input type="radio" id="star1" name="evaluation" value="1">
                            <label for="star1" title="1 étoile - Mauvais">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Enregistrer l'activité
                </button>
            </form>
        </div>
    </div>

    <script th:src="@{/js/activity/create.js}" defer></script>
</body>
</html>
