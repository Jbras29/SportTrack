<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="sidebarAdmin">
<nav class="slim-sidebar slim-sidebar--viewport"
     th:with="path=${navRequestPath} ?: '/'">
    <a th:href="@{/homeAdmin}" class="logo-icon logo-icon--brand" title="Sport Track Admin">
        <img th:src="@{/images/sporttrack.png}" width="40" height="40" alt="" class="logo-icon-img">
    </a>

    <button type="button"
            id="theme-toggle"
            class="theme-toggle"
            aria-pressed="false"
            title="Mode sombre"
            aria-label="Passer en mode sombre">
        <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
    </button>

    <a th:href="@{/homeAdmin}"
       class="nav-btn"
       th:classappend="${path == '/homeAdmin' or path == '/'} ? ' active'"
       title="Tableau de bord Administrateur">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
    </a>

    <div class="spacer"></div>

    <a th:href="@{/profile}"
       class="nav-btn profile-btn"
       th:classappend="${#strings.startsWith(path, '/profile')} ? ' active'"
       title="Profil Admin">
        <img th:if="${user != null}"
             th:src="${user.cheminPhotoProfilAffichee()}"
             width="40" height="40" alt="" class="profile-btn-img">
        <svg th:if="${user == null}"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </a>
    
    <form th:action="@{/logout}" method="post" class="nav-form">
        <button type="submit" class="nav-btn nav-btn-reset logout" title="Déconnexion">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
    </form>
</nav>
<script th:src="@{/js/theme.js}" defer></script>
</th:block>
</body>
</html>
