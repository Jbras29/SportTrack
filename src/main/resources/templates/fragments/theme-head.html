<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="themeHead">
<script>
(function () {
    try {
        var t = localStorage.getItem("sporttrack-theme");
        if (t === "dark" || t === "light") {
            document.documentElement.setAttribute("data-theme", t);
        }
    } catch (e) { /* ignore */ }
})();
</script>
</th:block>
</body>
</html>
