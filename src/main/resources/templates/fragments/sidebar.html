<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Barre latérale unique : état actif via le chemin HTTP (solution B). -->
<th:block th:fragment="sidebar">
<nav class="slim-sidebar slim-sidebar--viewport"
     th:with="path=${navRequestPath} ?: '/'">
    <a th:href="@{/home}" class="logo-icon logo-icon--brand" title="Sport Track">
        <img th:src="@{/images/sporttrack.png}" width="40" height="40" alt="" class="logo-icon-img">
    </a>

    <button type="button"
            id="theme-toggle"
            class="theme-toggle"
            aria-pressed="false"
            title="Mode sombre"
            aria-label="Passer en mode sombre">
        <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
    </button>

    <a th:href="@{/activites/create}"
       class="nav-btn nav-btn--create"
       th:classappend="${#strings.startsWith(path, '/activites/create')} ? ' active'"
       title="Créer une activité"
       aria-label="Créer une activité">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </a>

    <a th:href="@{/home}"
       class="nav-btn"
       th:classappend="${path == '/home'} ? ' active'"
       title="Accueil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </a>
    <a th:href="@{/dashboard}"
       class="nav-btn"
       th:classappend="${#strings.startsWith(path, '/dashboard')} ? ' active'"
       title="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
    </a>
    <a th:href="@{/challenges}"
    class="nav-btn"
    th:classappend="${#strings.startsWith(path, '/challenges')} ? ' active'"
    title="Défis">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
    </a>
    <a th:href="@{/evenements}"
       class="nav-btn"
       th:classappend="${#strings.startsWith(path, '/evenements') or path == '/creer-evenement'} ? ' active'"
       title="Événements">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    </a>
    <a th:href="@{/notifications}"
       class="nav-btn"
       th:classappend="${#strings.startsWith(path, '/notifications')} ? ' active'"
       title="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
    </a>
    <a th:href="@{/messages}"
       class="nav-btn"
       th:classappend="${#strings.startsWith(path, '/messages')} ? ' active'"
       title="Messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </a>
    <a th:href="@{/friend}"
       class="nav-btn"
       th:classappend="${#strings.startsWith(path, '/friend')} ? ' active'"
       title="Réseau">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
    </a>

    <div class="spacer"></div>

    <a th:href="@{/profile}"
       class="nav-btn profile-btn"
       th:classappend="${#strings.startsWith(path, '/profile')} ? ' active'"
       title="Mon profil">
        <img th:if="${user != null}"
             th:src="${user.cheminPhotoProfilAffichee()}"
             width="40" height="40" alt="" class="profile-btn-img">
        <img th:if="${user == null and utilisateurCourant != null}"
             th:src="${utilisateurCourant.cheminPhotoProfilAffichee()}"
             width="40" height="40" alt="" class="profile-btn-img">
        <img th:if="${user == null and utilisateurCourant == null and utilisateur != null}"
             th:src="${utilisateur.cheminPhotoProfilAffichee()}"
             width="40" height="40" alt="" class="profile-btn-img">
        <svg th:if="${user == null and utilisateurCourant == null and utilisateur == null}"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </a>
    <form th:action="@{/logout}" method="post" class="nav-form">
        <button type="submit" class="nav-btn nav-btn-reset logout" title="Déconnexion">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
    </form>
</nav>
<script th:src="@{/js/theme.js}" defer></script>
</th:block>
</body>
</html>
