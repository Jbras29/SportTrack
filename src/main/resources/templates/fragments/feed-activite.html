<article xmlns:th="http://www.thymeleaf.org"
         th:fragment="carteActivite (activite, user)"
         class="post-card feed-post"
         th:id="|post-${activite.id}|"
         th:attr="data-activite-id=${activite.id},
                  data-feed-comment-count=${#lists.size(activite.commentairesMessages)}">
    <div class="post-header">
        <a th:href="@{/profile/{id}(id=${activite.utilisateur.id})}"
           class="post-profile-link post-profile-link--avatar"
           th:attr="aria-label=|Profil de ${activite.utilisateur.prenom} ${activite.utilisateur.nom}|">
            <img th:src="${activite.utilisateur.cheminPhotoProfilAffichee()}"
                 th:alt="${activite.utilisateur.prenom}"
                 class="post-avatar">
        </a>
        <div class="post-meta">
            <a th:href="@{/profile/{id}(id=${activite.utilisateur.id})}"
               class="post-author post-profile-link"
               th:text="|${activite.utilisateur.prenom} ${activite.utilisateur.nom}|">
                Prénom Nom
            </a>
            <h2 class="post-activity-title" th:text="${activite.nom}">Nom de l’activité</h2>
            <p class="post-meta-details">
                <span th:text="${#temporals.format(activite.date, 'dd/MM/yyyy')}">01/01/2025</span>
                <span th:if="${activite.location != null and !activite.location.isBlank()}"
                      th:text="| • ${activite.location}|"></span>
                <span th:text="| • ${#strings.replace(activite.typeSport.name(), '_', ' ')}|"></span>
            </p>
        </div>
    </div>

    <div class="activity-stats">
        <div class="stat-item" th:if="${activite.distance != null}">
            <div class="value" th:text="${#numbers.formatDecimal(activite.distance, 1, 1)}">0</div>
            <div class="label">Kilomètres</div>
        </div>
        <div class="stat-item" th:unless="${activite.distance != null}">
            <div class="value">—</div>
            <div class="label">Kilomètres</div>
        </div>
        <div class="stat-item" th:if="${activite.temps != null}">
            <div class="value" th:text="|${activite.temps / 60}h ${activite.temps % 60}m|">0h 0m</div>
            <div class="label">Durée</div>
        </div>
        <div class="stat-item" th:unless="${activite.temps != null}">
            <div class="value">—</div>
            <div class="label">Durée</div>
        </div>
        <div class="stat-item" th:if="${activite.temps != null}">
            <div class="value value-accent"
                 th:text="${#numbers.formatDecimal(@activiteService.calculerKilocaloriesPourActivite(activite), 1, 0)}">0</div>
            <div class="label">kcal</div>
        </div>
        <div class="stat-item" th:unless="${activite.temps != null}">
            <div class="value">—</div>
            <div class="label">kcal</div>
        </div>
    </div>

    <div class="reactions-bar" th:if="${!#lists.isEmpty(activite.reactionsGroupees)}">
        <div class="reactions-bar-track">
            <button type="button" class="reaction-chip"
                    th:each="r : ${activite.reactionsGroupeesAffichees}"
                    th:classappend="${activite.utilisateurAEmitReactionAvecEmoji(user.id, r.emoji)} ? 'reaction-chip--mine' : ''"
                    th:data-commentaire-id="${activite.utilisateurAEmitReactionAvecEmoji(user.id, r.emoji) ? activite.getIdCommentaireReactionUtilisateur(user.id, r.emoji) : null}"
                    th:attr="data-tooltip=${r.nomsDesReacteurs},
                              data-emoji=${r.emoji}"
                    th:aria-label="|${r.emoji} : ${r.nomsDesReacteurs}|">
                <span class="reaction-chip-main">
                    <span class="reaction-chip-emoji" th:text="${r.emoji}" role="img" aria-hidden="true">👍</span>
                    <span class="reaction-chip-count" th:text="${r.nombre}">1</span>
                    <span class="reaction-chip-loading" aria-hidden="true"></span>
                </span>
                <span class="reaction-chip-remove"
                      th:if="${activite.utilisateurAEmitReactionAvecEmoji(user.id, r.emoji)}"
                      th:attr="aria-label='Retirer la réaction',title='Retirer la réaction'">×</span>
            </button>
            <button type="button" class="reactions-more-btn"
                    th:if="${activite.reactionsGroupeesMasqueesCount > 0}"
                    th:aria-label="|${activite.reactionsGroupeesMasqueesCount} autre${activite.reactionsGroupeesMasqueesCount > 1 ? 's' : ''} type${activite.reactionsGroupeesMasqueesCount > 1 ? 's' : ''} de réaction|">
                <span class="reactions-more-icon" aria-hidden="true">+</span>
                <span class="reactions-more-count" th:text="${activite.reactionsGroupeesMasqueesCount}">2</span>
            </button>
        </div>
    </div>

    <div class="post-actions">
        <div class="action-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span class="js-feed-comment-count"
                  th:text="|${#lists.size(activite.commentairesMessages)} commentaire${#lists.size(activite.commentairesMessages) != 1 ? 's' : ''}|">0 commentaires</span>
        </div>
        <div class="post-actions-right">
            <button type="button"
                    class="btn btn-secondary post-actions-plus-btn"
                    aria-label="Plus d'options">
                <span class="post-actions-plus-char" aria-hidden="true">+</span>
                <span class="post-actions-plus-emoji" aria-hidden="true">😊</span>
                <span class="post-actions-plus-spinner" aria-hidden="true"></span>
            </button>
            <button type="button"
                    class="btn btn-secondary comment-composer-toggle"
                    aria-expanded="false"
                    th:aria-controls="|comment-composer-${activite.id}|">
                Commenter
            </button>
        </div>
    </div>

    <div class="comment-composer"
         th:id="|comment-composer-${activite.id}|"
         hidden>
        <input type="text"
               class="comment-composer-input"
               maxlength="2000"
               th:id="|comment-activite-${activite.id}|"
               th:name="|comment-activite-${activite.id}|"
               th:aria-label="'Écrire un commentaire'"
               placeholder="Écrire un commentaire…"
               autocomplete="off">
        <button type="button" class="btn btn-primary comment-composer-post">
            <span class="comment-composer-post-label">Poster</span>
            <span class="comment-composer-post-spinner" aria-hidden="true"></span>
        </button>
    </div>

    <div class="comments-section" th:if="${!#lists.isEmpty(activite.commentairesMessages)}">
        <div class="comment"
             th:each="c : ${activite.commentairesMessages}"
             th:attr="data-commentaire-id=${c.id},data-activite-id=${activite.id}">
            <img class="comment-avatar" th:src="${c.auteur.cheminPhotoProfilAffichee()}" th:alt="${c.auteur.prenom}">
            <div class="comment-inner">
                <div class="comment-bubble">
                    <a th:href="@{/profile/{id}(id=${c.auteur.id})}"
                       class="comment-author-link post-profile-link"
                       th:text="|${c.auteur.prenom} ${c.auteur.nom}|"
                       th:attr="aria-label=|Profil de ${c.auteur.prenom} ${c.auteur.nom}|">Auteur</a>
                    <span th:text="${c.message}">Message</span>
                </div>
                <button type="button"
                        class="comment-delete-btn"
                        th:if="${c.auteur.id == user.id}"
                        th:attr="aria-label='Supprimer le commentaire',title='Supprimer le commentaire'">
                    <svg class="comment-delete-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</article>
