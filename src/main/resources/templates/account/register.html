<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte | Sport Track</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page register-page">

    <div class="register-card">
        <div class="logo">
            <span class="sport">Sport</span><span class="track">Track</span>
        </div>
        <div class="subtitle">Créez votre profil d'athlète</div>

        <form id="register-form" action="/utilisateurs/create" method="POST">
            <div class="form-grid">
                
                <div class="input-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" placeholder="Ousmane" required>
                </div>

                <div class="input-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" placeholder="Feno" required>
                </div>

                <div class="input-group full-width">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" name="email" placeholder="feno.sport@example.com" required>
                </div>

                <div class="input-group full-width">
                    <label for="motdepasse">Mot de passe</label>
                    <input type="password" id="motdepasse" name="motdepasse" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="sexe">Sexe</label>
                    <select id="sexe" name="sexe">
                        <option value="">Sélectionnez...</option>
                        <option value="M">Homme</option>
                        <option value="F">Femme</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="age">Âge</label>
                    <input type="number" id="age" name="age" min="1" max="120" placeholder="ex: 25">
                </div>

                <div class="input-group">
                    <label for="poids">Poids (kg)</label>
                    <input type="number" step="0.1" id="poids" name="poids" placeholder="ex: 70.5">
                </div>

                <div class="input-group">
                    <label for="taille">Taille (cm)</label>
                    <input type="number" step="1" id="taille" name="taille" placeholder="ex: 175">
                </div>

            </div>

            <button type="submit" class="btn-primary">Rejoindre l'aventure</button>
        </form>

        <div class="login-link">
            Déjà un compte ? <a href="/login">Se connecter ici</a>
        </div>
    </div>

    <script src="/js/account/register.js" defer></script>
</body>
</html>
