<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le Profil | Sport Track</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-shell profile-page">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--centered">
        
        <div class="form-card">
            <div th:if="${photoMessage}" class="flash-banner ok" th:text="${photoMessage}"></div>
            <div th:if="${photoErreur}" class="flash-banner err" th:text="${photoErreur}"></div>
            <div th:if="${preferenceMessage}" class="flash-banner ok" th:text="${preferenceMessage}"></div>
            <div th:if="${preferenceErreur}" class="flash-banner err" th:text="${preferenceErreur}"></div>

            <form th:action="@{/profile/photo}" method="post" enctype="multipart/form-data" id="form-photo-profil" class="is-hidden">
                <input type="file" name="file" id="input-photo-profil" accept="image/*">
            </form>

            <div class="form-header">
                <div class="profile-avatar-edit">
                    <img th:src="${utilisateur.cheminPhotoProfilAffichee()}" alt="Photo de profil" width="70" height="70">
                    <div class="edit-avatar-btn" title="Modifier la photo" role="button" tabindex="0">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    </div>
                </div>
                <div class="form-header-text">
                    <h1>Modifier mon profil</h1>
                    <p>Mettez à jour vos informations et ajustez vos objectifs d'entraînement.</p>
                </div>
            </div>

            <form th:action="@{/profile/edit}" th:object="${utilisateur}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{photoProfil}">

                <div class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Informations personnelles
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="prenom">Prénom <span class="required">*</span></label>
                        <input type="text" id="prenom" th:field="*{prenom}" required>
                    </div>

                    <div class="form-group">
                        <label for="nom">Nom <span class="required">*</span></label>
                        <input type="text" id="nom" th:field="*{nom}" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail <span class="required">*</span></label>
                        <input type="email" id="email" th:field="*{email}" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="motdepasse">Nouveau mot de passe</label>
                        <input type="password" id="motdepasse" name="motdepasse"
                               placeholder="Laisser vide pour ne rien changer"
                               autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label for="sexe">Sexe</label>
                        <select id="sexe" name="sexe">
                            <option value=""
                                    th:selected="${utilisateur.sexe == null or #strings.isEmpty(utilisateur.sexe)}">Sélectionnez...</option>
                            <option value="M"
                                    th:selected="${#strings.equals(utilisateur.sexe, 'M') or #strings.equals(utilisateur.sexe, 'HOMME')}">Homme</option>
                            <option value="F"
                                    th:selected="${#strings.equals(utilisateur.sexe, 'F') or #strings.equals(utilisateur.sexe, 'FEMME')}">Femme</option>
                            <option value="Autre"
                                    th:selected="${#strings.equals(utilisateur.sexe, 'Autre') or #strings.equals(utilisateur.sexe, 'AUTRE')}">Autre</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="age">Âge</label>
                        <input type="number" id="age" th:field="*{age}" min="1" max="120">
                    </div>
                </div>

                <div class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                    Morphologie
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="poids">Poids</label>
                        <div class="input-suffix" data-suffix="kg">
                            <input type="number" id="poids" th:field="*{poids}" step="0.1" min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="taille">Taille</label>
                        <div class="input-suffix" data-suffix="cm">
                            <input type="number" id="taille" th:field="*{taille}" step="1" min="0">
                        </div>
                    </div>
                </div>

                <div class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                    Profil sportif
                </div>

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="niveauPratiqueSportive">Niveau de pratique sportive</label>
                        <select id="niveauPratiqueSportive" th:field="*{niveauPratiqueSportive}">
                            <option value="">Non spécifié</option>
                            <option th:each="n : ${niveauxPratique}" th:value="${n}"
                                    th:text="${n.name() == 'DEBUTANT'} ? 'Débutant — je découvre ou reprends le sport' : (${n.name() == 'INTERMEDIAIRE'} ? 'Intermédiaire — pratique régulière' : (${n.name() == 'AVANCE'} ? 'Avancé — entraînement soutenu' : 'Expert — compétition / athlète'))"></option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="objectifsPersonnels">Objectifs personnels</label>
                        <textarea id="objectifsPersonnels" th:field="*{objectifsPersonnels}"
                                  placeholder="Ex. : courir 50 km par mois, semi-marathon, objectifs de poids…"></textarea>
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary">Annuler</button>
                    <button type="submit" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Enregistrer les modifications
                    </button>
                </div>

            </form>

            <div class="preferences-card">
                <div class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M3 6h.01"></path><path d="M3 12h.01"></path><path d="M3 18h.01"></path></svg>
                    Préférences sportives
                </div>

                <div class="preferences-list" th:if="${utilisateur.prefSportives != null and !#lists.isEmpty(utilisateur.prefSportives)}">
                    <div class="preference-item" th:each="pref : ${utilisateur.prefSportives}">
                        <span class="preference-name" th:text="${pref.nom}">Course</span>
                        <form class="inline-form"
                              th:action="@{/profile/preferences/{prefSportiveId}/delete(prefSportiveId=${pref.id})}"
                              method="post">
                            <input type="hidden" name="id" th:value="${utilisateur.id}">
                            <button type="submit" class="btn btn-delete">Supprimer</button>
                        </form>
                    </div>
                </div>

                <div class="preference-empty" th:if="${utilisateur.prefSportives == null or #lists.isEmpty(utilisateur.prefSportives)}">
                    Aucune préférence sportive ajoutée pour le moment.
                </div>

                <form class="preference-add-form" th:action="@{/profile/preferences}" method="post">
                    <input type="hidden" name="id" th:value="${utilisateur.id}">
                    <div class="form-group">
                        <label for="nomPreference">Ajouter une préférence</label>
                        <input type="text" id="nomPreference" name="nomPreference"
                               placeholder="Ex. : course, natation, tennis" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Ajouter</button>
                </form>
            </div>
        </div>

    </div>

    <script th:src="@{/js/profile/edit.js}" defer></script>
</body>
</html>
