<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le Profil | Sport Track</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Palette de couleurs Sport Track */
        :root {
            --brand-blue: #135077;
            --brand-orange: #F39434;
            --brand-light-blue: #21A2D7;
            --brand-green: #8EB445;
            
            --bg-app: #F3F6F8;
            --bg-card: #FFFFFF;
            
            --text-main: #0F172A;
            --text-muted: #64748B;
            
            --border-light: #E2E8F0;
            --hover-bg: #F1F5F9;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MENU COMPACT (Sidebar) --- */
        .slim-sidebar {
            width: 80px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-light-blue));
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 40px;
            box-shadow: 0 4px 10px rgba(33, 162, 215, 0.3);
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .nav-btn:hover { background-color: var(--hover-bg); color: var(--brand-blue); }
        .nav-btn.active { background-color: rgba(33, 162, 215, 0.1); color: var(--brand-blue); }
        .nav-btn svg { width: 24px; height: 24px; }
        .spacer { flex-grow: 1; }

        /* --- CONTENU PRINCIPAL --- */
        .main-wrapper {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* --- FORMULAIRE --- */
        .form-card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            margin-bottom: 40px;
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .profile-avatar-edit {
            position: relative;
            width: 70px;
            height: 70px;
        }

        .profile-avatar-edit img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--brand-blue);
            object-fit: cover;
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background-color: var(--brand-orange);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid var(--bg-card);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .edit-avatar-btn svg { width: 14px; height: 14px; }

        .form-header-text h1 { margin: 0 0 5px 0; font-size: 24px; color: var(--brand-blue); }
        .form-header-text p { margin: 0; color: var(--text-muted); font-size: 14px; }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--brand-blue);
            margin: 30px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title svg { color: var(--brand-orange); }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width { grid-column: span 2; }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }
        
        .form-group label span.required { color: var(--brand-orange); }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.2s;
            background-color: #FAFCFD;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--brand-light-blue);
            background-color: var(--bg-card);
            box-shadow: 0 0 0 4px rgba(33, 162, 215, 0.1);
        }

        .input-suffix { position: relative; }
        .input-suffix input { padding-right: 50px; }
        .input-suffix::after {
            content: attr(data-suffix);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 14px;
            pointer-events: none;
        }

        /* --- PREFERENCES SPORTIVES (Chips/Pills) --- */
        .sport-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip-label {
            position: relative;
            cursor: pointer;
        }

        .chip-label input { display: none; }

        .chip-text {
            display: inline-block;
            padding: 8px 16px;
            background-color: var(--hover-bg);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .chip-label input:checked + .chip-text {
            background-color: var(--brand-light-blue);
            border-color: var(--brand-light-blue);
            color: white;
            box-shadow: 0 2px 8px rgba(33, 162, 215, 0.3);
        }

        .chip-label input:hover:not(:checked) + .chip-text {
            background-color: #E2E8F0;
            color: var(--text-main);
        }

        /* --- BOUTONS D'ACTION --- */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            border-top: 1px solid var(--border-light);
            padding-top: 25px;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--brand-blue);
            color: white;
            flex-grow: 1;
        }

        .btn-primary:hover {
            background-color: #0f3e5c;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--hover-bg);
            color: var(--text-main);
            border: 1px solid var(--border-light);
        }

        .btn-secondary:hover {
            background-color: #E2E8F0;
        }

        @media (max-width: 650px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .main-wrapper { padding: 20px; }
            .form-card { padding: 25px; }
            .action-buttons { flex-direction: column-reverse; }
        }

        .flash-banner {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .flash-banner.ok { background: rgba(142, 180, 69, 0.15); color: var(--brand-green); border: 1px solid rgba(142, 180, 69, 0.35); }
        .flash-banner.err { background: rgba(243, 148, 52, 0.12); color: #b45309; border: 1px solid rgba(243, 148, 52, 0.35); }
    </style>
</head>
<body>

    <nav class="slim-sidebar">
        <div class="logo-icon">S</div>
        <a href="#" class="nav-btn" title="Accueil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
        <a href="#" class="nav-btn" title="Mes Activités">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        </a>
        <div class="spacer"></div>
        <a href="#" class="nav-btn active" title="Mon Profil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
    </nav>

    <div class="main-wrapper">
        
        <div class="form-card">
            <div th:if="${photoMessage}" class="flash-banner ok" th:text="${photoMessage}"></div>
            <div th:if="${photoErreur}" class="flash-banner err" th:text="${photoErreur}"></div>

            <form th:action="@{/profile/photo}" method="post" enctype="multipart/form-data" id="form-photo-profil" style="display:none;">
                <input type="file" name="file" id="input-photo-profil" accept="image/*">
            </form>

            <div class="form-header">
                <div class="profile-avatar-edit">
                    <img th:src="${utilisateur.cheminPhotoProfilAffichee()}" alt="Photo de profil" width="70" height="70">
                    <div class="edit-avatar-btn" title="Modifier la photo" role="button" tabindex="0">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    </div>
                </div>
                <div class="form-header-text">
                    <h1>Modifier mon profil</h1>
                    <p>Mettez à jour vos informations et ajustez vos objectifs d'entraînement.</p>
                </div>
            </div>

            <form th:action="@{/profile/edit}" th:object="${utilisateur}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{photoProfil}">

                <div class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Informations personnelles
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="prenom">Prénom <span class="required">*</span></label>
                        <input type="text" id="prenom" th:field="*{prenom}" required>
                    </div>

                    <div class="form-group">
                        <label for="nom">Nom <span class="required">*</span></label>
                        <input type="text" id="nom" th:field="*{nom}" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail <span class="required">*</span></label>
                        <input type="email" id="email" th:field="*{email}" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="motdepasse">Nouveau mot de passe</label>
                        <input type="password" id="motdepasse" name="motdepasse"
                               placeholder="Laisser vide pour ne rien changer"
                               autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label for="sexe">Sexe</label>
                        <select id="sexe" th:field="*{sexe}">
                            <option value="">Non spécifié</option>
                            <option value="HOMME">Homme</option>
                            <option value="FEMME">Femme</option>
                            <option value="AUTRE">Autre</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="age">Âge</label>
                        <input type="number" id="age" th:field="*{age}" min="1" max="120">
                    </div>
                </div>

                <div class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                    Morphologie
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="poids">Poids</label>
                        <div class="input-suffix" data-suffix="kg">
                            <input type="number" id="poids" th:field="*{poids}" step="0.1" min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="taille">Taille</label>
                        <div class="input-suffix" data-suffix="cm">
                            <input type="number" id="taille" th:field="*{taille}" step="1" min="0">
                        </div>
                    </div>
                </div>

                <div class="section-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                    Profil sportif
                </div>

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="niveauPratiqueSportive">Niveau de pratique sportive</label>
                        <select id="niveauPratiqueSportive" th:field="*{niveauPratiqueSportive}">
                            <option value="">Non spécifié</option>
                            <option th:each="n : ${niveauxPratique}" th:value="${n}"
                                    th:text="${n == T(com.jocf.sporttrack.model.NiveauPratiqueSportive).DEBUTANT} ? 'Débutant — je découvre ou reprends le sport' : (${n == T(com.jocf.sporttrack.model.NiveauPratiqueSportive).INTERMEDIAIRE} ? 'Intermédiaire — pratique régulière' : (${n == T(com.jocf.sporttrack.model.NiveauPratiqueSportive).AVANCE} ? 'Avancé — entraînement soutenu' : 'Expert — compétition / athlète'))"></option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Préférences sportives</label>
                        <div class="sport-chips">
                            <label class="chip-label" th:each="pref : ${toutesPrefSportives}">
                                <input type="checkbox" name="prefSportiveIds" th:value="${pref.id}"
                                       th:checked="${utilisateur.prefSportives != null and #lists.contains(utilisateur.prefSportives.![id], pref.id)}">
                                <span class="chip-text" th:text="${pref.nom}">Sport</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="objectifsPersonnels">Objectifs personnels</label>
                        <textarea id="objectifsPersonnels" th:field="*{objectifsPersonnels}"
                                  placeholder="Ex. : courir 50 km par mois, semi-marathon, objectifs de poids…"></textarea>
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary">Annuler</button>
                    <button type="submit" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Enregistrer les modifications
                    </button>
                </div>

            </form>
        </div>

    </div>

    <script>
        (function () {
            var btn = document.querySelector('.edit-avatar-btn');
            var input = document.getElementById('input-photo-profil');
            var form = document.getElementById('form-photo-profil');
            if (!btn || !input || !form) return;
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                input.click();
            });
            btn.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    input.click();
                }
            });
            input.addEventListener('change', function () {
                if (input.files && input.files.length) {
                    form.submit();
                }
            });
        })();
    </script>
</body>
</html>
