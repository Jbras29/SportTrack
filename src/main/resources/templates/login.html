<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Sport Track</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page login-page">
    <div class="login-card">
        <div class="logo">
            <span class="sport">Sport</span><span class="track">Track</span>
        </div>

        <!-- Message d'erreur si login échoué -->
        <div th:if="${param.error}" class="error-msg">
            Email ou mot de passe incorrect.
        </div>

        <form action="/login" method="POST">
            <div class="input-group">
                <label for="username">Email</label>
                <input type="text" id="username" name="username" placeholder="Entrez votre email" required>
            </div>
            <div class="input-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <div class="divider">ou</div>

        <button type="button" id="go-register" class="btn-secondary">
            Créer un compte
        </button>
    </div>
    <script th:src="@{/js/login.js}" defer></script>
</body>
</html>
