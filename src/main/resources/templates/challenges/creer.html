<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Track | Créer un Événement</title>
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-shell event-create-page">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--stack">
        <div class="page-header event-create-header">
            <h1 class="event-form-title">Nouveau défi</h1>
            <p class="event-form-subtitle">Organisez un défi et invitez votre communauté.</p>
        </div>

        <div class="form-card">
            <form id="formEvenement">
                <div class="form-group">
                    <label for="nom">Nom du défi</label>
                    <input type="text" id="nom" placeholder="Ex: Faire 50 pompes par jour" required>
                </div>

                <div class="form-group">
                    <label for="date">Date Début &amp; Heure</label>
                    <input type="datetime-local" id="date" required>
                </div>

                <div class="form-group">
                    <label for="date">Date Fin &amp; Heure</label>
                    <input type="datetime-local" id="date" required>
                </div>

                <div class="form-group">
                    <label for="description">Classement</label>
                    <textarea id="description" rows="3" placeholder=" "></textarea>
                </div>

                <div class="form-group">
                    <span class="form-group-heading">Inviter des amis</span>
                    <div id="listeAmis" class="friend-selector">
                        <p th:if="${#lists.isEmpty(amis)}" class="text-muted friend-selector-empty">Aucun ami trouvé.</p>

                        <label th:each="ami : ${amis}" class="friend-checkbox-card">
                            <input type="checkbox" class="ami-check" th:value="${ami.id}">
                            <div class="friend-info">
                                <div class="mini-avatar" th:text="${#strings.toUpperCase(#strings.substring(ami.nom, 0, 1))}">A</div>
                                <span th:text="${ami.nom}">Nom de l'ami</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="event-form-actions">
                    <button type="submit" id="btnSubmit" class="btn btn-primary event-submit">Créer le défi</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("formEvenement").addEventListener("submit", async function (e) {
            e.preventDefault();
            var btn = document.getElementById("btnSubmit");
            var selected = Array.from(document.querySelectorAll(".ami-check:checked")).map(function (c) {
                return { id: parseInt(c.value, 10) };
            });

            var data = {
                nom: document.getElementById("nom").value,
                date: document.getElementById("date").value,
                description: document.getElementById("description").value,
                participants: selected
            };

            btn.disabled = true;
            btn.innerText = "Patientez…";

            try {
                var res = await fetch("/api/evenements/creer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert("Événement créé !");
                    window.location.href = "/evenements";
                } else {
                    alert("Erreur lors de la création.");
                }
            } catch (err) {
                console.error("Erreur détaillée:", err);
                alert("Erreur serveur.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Créer l'événement";
            }
        });
    </script>
</body>
</html>
