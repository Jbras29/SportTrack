<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Track | Créer un Challenge</title>
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-shell event-create-page">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--stack">
        <div class="page-header event-create-header">
            <h1 class="event-form-title">Nouveau challenge</h1>
            <p class="event-form-subtitle">Créez un challenge et motivez votre communauté !</p>
        </div>

        <form th:action="@{/challenges/creer}" method="post">
            <div class="form-group">
                <label for="nom">Nom du challenge</label>
                <input type="text" id="nom" name="nom" placeholder="Ex: 100 km en mai" required>
            </div>

            <div class="form-group">
                <label for="dateDebut">Date de début</label>
                <input type="date" id="dateDebut" name="dateDebut" required>
            </div>

            <div class="form-group">
                <label for="dateFin">Date de fin</label>
                <input type="date" id="dateFin" name="dateFin" required>
            </div>

            <div class="event-form-actions">
                <a href="/challenges" class="btn btn-secondary">Annuler</a>
                <button type="submit" class="btn btn-primary event-submit">Créer le challenge</button>
            </div>
        </form>
    </div>

</body>
</html>
