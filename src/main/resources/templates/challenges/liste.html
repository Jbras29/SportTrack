<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Défis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Nos Défis Sportifs</h1>
        <a th:href="@{/challenges/creer}" class="btn btn-primary">Créer un nouveau défi</a>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Nom du Défi</th>
                <th>Date de Début</th>
                <th>Date de Fin</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="challenge : ${challenges}">
                <td th:text="${challenge.nom}" class="fw-bold">Nom du défi</td>
                <td th:text="${#dates.format(challenge.dateDebut, 'dd/MM/yyyy')}">01/01/2026</td>
                <td th:text="${#dates.format(challenge.dateFin, 'dd/MM/yyyy')}">31/01/2026</td>
                <td>
                    <a th:href="@{/api/challenges/{id}(id=${challenge.id})}" class="btn btn-sm btn-info text-white">Détails (API)</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(challenges)}">
                <td colspan="4" class="text-center text-muted">Aucun défi disponible pour le moment.</td>
            </tr>
        </tbody>
    </table>
    
    <div class="mt-4">
        <a href="/" class="btn btn-secondary">Retour à l'accueil</a>
    </div>
</div>

</body>
</html>
