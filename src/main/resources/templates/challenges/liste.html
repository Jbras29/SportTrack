<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Défis | Sport Track</title>
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-shell">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--stack">

        <div class="profile-header">
            <div class="profile-info">
                <h1>Défis Sportifs</h1>
                <p>Rejoignez un défi ou lancez le vôtre !</p>
            </div>
            <a th:href="@{/challenges/creer}" class="btn-primary">+ Créer un défi</a>
        </div>

        <!-- Aucun défi -->
        <div th:if="${#lists.isEmpty(challenges)}" class="dash-card dash-card--narrow">
            <p class="text-muted" style="text-align:center; padding: 2rem 0;">
                Aucun défi disponible pour le moment.
            </p>
        </div>

        <!-- Liste des défis -->
        <div th:unless="${#lists.isEmpty(challenges)}" class="dash-card">
            <table class="stat-table">
                <thead>
                    <tr>
                        <th>Nom du défi</th>
                        <th>Date de début</th>
                        <th>Date de fin</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="challenge : ${challenges}">
                        <td class="fw-bold" th:text="${challenge.nom}">Nom</td>
                        <td th:text="${#temporals.format(challenge.dateDebut, 'dd/MM/yyyy')}">01/01/2026</td>
                        <td th:text="${#temporals.format(challenge.dateFin, 'dd/MM/yyyy')}">31/01/2026</td>
                        <td>
                            <a th:href="@{/challenges/{id}(id=${challenge.id})}" class="btn-primary" style="font-size:0.8rem; padding: 0.3rem 0.8rem;">
                                Voir le détail
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</body>
</html>
