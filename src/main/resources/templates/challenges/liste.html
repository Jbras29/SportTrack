<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Track | Challenges</title>
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-shell challenges-page">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--stack">

        <div class="page-header event-create-header">
            <div>
                <h1 class="event-form-title">Challenges</h1>
                <p class="event-form-subtitle">Rejoignez un challenge ou créez le vôtre !</p>
            </div>
            <a th:href="@{/challenges/creer}" class="btn btn-primary">+ Créer un challenge</a>
        </div>

        <p th:if="${#lists.isEmpty(challenges)}" class="empty-copy">
            Aucun challenge disponible pour le moment.
        </p>

        <div th:unless="${#lists.isEmpty(challenges)}" class="challenges-grid">
            <div th:each="challenge : ${challenges}" class="challenge-card">

                <div class="challenge-title" th:text="${challenge.nom}">Nom du challenge</div>

                <div class="defi-meta"
                     th:if="${challenge.dateDebut != null and challenge.dateFin != null}"
                     th:text="|${#dates.format(challenge.dateDebut, 'dd/MM/yyyy')} — ${#dates.format(challenge.dateFin, 'dd/MM/yyyy')}|">
                </div>

                <div class="defi-meta"
                     th:text="|${challenge.participants.size()} participant(s)|">
                </div>

                <div class="defi-meta"
                     th:text="|Organisé par ${challenge.organisateur.prenom} ${challenge.organisateur.nom}|">
                </div>

                <div class="event-form-actions">
                    <a th:href="@{/challenges/{id}(id=${challenge.id})}"
                       class="btn btn-secondary">Voir le classement</a>
                </div>

                <form th:if="${sessionUser != null and challenge.organisateur != null and challenge.organisateur.id == sessionUser.id()}"
                    th:action="@{/challenges/{id}/supprimer(id=${challenge.id})}"
                    method="post"
                    onsubmit="return confirm('Supprimer ce challenge ?');"
                    style="margin-top: 0.5rem;">
                    <button type="submit" class="btn btn-secondary">Supprimer</button>
                </form>

            </div>
        </div>

    </div>

</body>
</html>
