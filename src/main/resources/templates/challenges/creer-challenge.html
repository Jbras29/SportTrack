<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un Challenge | Sport Track</title>
    <th:block th:replace="~{fragments/theme-head :: themeHead}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="app-shell">

    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <div class="main-wrapper main-wrapper--stack">

        <div class="page-header event-create-header">
            <div>
                <h1 class="event-form-title">Créer un Challenge</h1>
                <p class="event-form-subtitle">Lancez un défi à la communauté !</p>
            </div>
        </div>

        <div class="dash-card dash-card--narrow">

            <p th:if="${erreur}" class="error-message" th:text="${erreur}"></p>

            <form th:action="@{/challenges/creer}" method="post">

                <div class="form-group">
                    <label for="nom" class="form-label">Nom du challenge</label>
                    <input type="text" id="nom" name="nom"
                           class="form-control" placeholder="Ex: Trail de mai" required>
                </div>

                <div class="form-group">
                    <label for="objectifJour" class="form-label">Objectif du jour</label>
                    <input type="text" id="objectifJour" name="objectifJour"
                           class="form-control" placeholder="Ex: courir 5 km" required>
                </div>

                <div class="form-group">
                    <label for="dateDebut" class="form-label">Date de début</label>
                    <input type="date" id="dateDebut" name="dateDebut" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="dateFin" class="form-label">Date de fin</label>
                    <input type="date" id="dateFin" name="dateFin" class="form-control" required>
                </div>

                <div class="event-form-actions">
                    <a th:href="@{/challenges}" class="btn btn-secondary">Annuler</a>
                    <button type="submit" class="btn btn-primary">Créer le challenge</button>
                </div>

            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:inline="javascript">
        /*  (Vérification de l'erreur côté serveur) */
        const errorMessage = [[${erreur}]];

        if (errorMessage) {
            Swal.fire({
                title: 'ACTION BLOQUÉE',
                text: errorMessage,
                icon: 'error',
                confirmButtonColor: '#1E1E1E', /* 黑色按钮，匹配你的工业风 */
                confirmButtonText: 'COMPRIS',
                customClass: {
                    popup: 'swal-industrial-popup'
                }
            });
        }

        /*  (Sécurité supplémentaire : bouton désactivé si HP=0) */
        const userHp = [[${user.hpNormalise}]];
        if (userHp <= 0) {
            const submitBtn = document.querySelector('button[type="submit"]');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                submitBtn.style.cursor = 'not-allowed';
                submitBtn.innerText = '🔒 COMPTE RESTREINT';
            }
        }
    </script>

</body>
</html>
