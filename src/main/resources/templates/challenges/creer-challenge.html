<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un Challenge – Sport Track</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-layout">

    <!-- Sidebar -->
    <th:block th:insert="~{fragments/sidebar :: sidebar}" />

    <!-- Contenu principal -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Créer un Challenge</h1>
        </div>

        <!-- Message d'erreur -->
        <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

        <div class="card">
            <form method="post" th:action="@{/challenges/creer}">

                <div class="form-group">
                    <label for="nom" class="form-label">Nom du challenge</label>
                    <input type="text" id="nom" name="nom" class="form-control"
                           placeholder="Ex: 10km en 30 jours" required />
                </div>

                <div class="form-group">
                    <label for="dateDebut" class="form-label">Date de début</label>
                    <input type="date" id="dateDebut" name="dateDebut" class="form-control" required />
                </div>

                <div class="form-group">
                    <label for="dateFin" class="form-label">Date de fin</label>
                    <input type="date" id="dateFin" name="dateFin" class="form-control" required />
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Créer le challenge</button>
                    <a th:href="@{/challenges}" class="btn btn-secondary">Annuler</a>
                </div>

            </form>
        </div>
    </main>

</div>

</body>
</html>
